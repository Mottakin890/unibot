name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Deployment Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: SUPABASE_URL,SUPABASE_ANON_KEY,GOOGLE_API_KEY,OPENAI_KEY
          script: |
            export DEBIAN_FRONTEND=noninteractive
            export PATH=$PATH:/usr/bin:/usr/local/bin
            cd /var/www/unibot

            git reset --hard
            git pull origin master

            # We no longer overwrite .env.local here because it erases the active keys if GitHub Secrets are empty.

            npm install
            npm run build
            pm2 restart unibot
