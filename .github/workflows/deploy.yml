name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Deployment Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: SUPABASE_URL,SUPABASE_ANON_KEY,GOOGLE_API_KEY,OPENAI_KEY
          script: |
            export DEBIAN_FRONTEND=noninteractive
            export PATH=$PATH:/usr/bin:/usr/local/bin
            cd /var/www/unibot

            git reset --hard
            git pull origin master

            # Write environment variables to .env.local
            printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n' "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > .env.local
            printf 'NEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local
            printf 'NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=%s\n' "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local
            printf 'GOOGLE_GENERATIVE_AI_API_KEY=%s\n' "${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}" >> .env.local
            printf 'OPENAI_API_KEY=%s\n' "${{ secrets.OPENAI_API_KEY }}" >> .env.local

            npm install
            npm run build
            pm2 restart unibot
